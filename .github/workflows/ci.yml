name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "*.config.*"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "*.config.*"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"

jobs:
  lint:
    name: Lint, Format & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint check
        run: pnpm run lint

      - name: Prettier check
        run: pnpm run format:check

      - name: Type check
        run: pnpm run typecheck

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for production
        run: pnpm run build

  all-checks-passed:
    name: All Checks Passed
    needs: [lint, build]
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 5

    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ One or more CI checks failed!"
            echo ""
            echo "📊 Job Results:"
            echo "  • Lint, Format & Type Check: ${{ needs.lint.result }}"
            echo "  • Build: ${{ needs.build.result }}"
            echo ""
            echo "Please fix the failing checks before merging this PR."
            exit 1
          fi
          echo "✅ All CI checks passed! PR is ready to merge."
